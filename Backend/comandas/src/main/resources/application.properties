# ══════════════════════════════════════════════════════════════════════════════
# RestoSync — application.properties
# ══════════════════════════════════════════════════════════════════════════════
 
# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=restosync
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

#spring.application.name=comandas

# ── Base de datos MySQL ───────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/restosync_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:restosync_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rodrigo30ja}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# Pool de conexiones HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
 
# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate: verifica que el schema coincide con las entidades, sin modificar la BD
# Cambiar a "create-drop" solo para pruebas iniciales, nunca en producción
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
 
# ── SQL Init (schema.sql + data.sql) ─────────────────────────────────────────
# "always": ejecuta los scripts en cada arranque
# Cambiar a "never" una vez que la BD esté poblada y estable
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true
 
# ── JWT ───────────────────────────────────────────────────────────────────────
# IMPORTANTE: cambiar el secret en producción por una cadena aleatoria de 256+ bits
jwt.secret=${JWT_SECRET:restosync-dev-secret-change-me-minimum-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}
 
# ── WebSocket ─────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
spring.websocket.allowed-origins=${APP_WS_ALLOWED_ORIGINS:${app.cors.allowed-origins}}
 
# ── Jackson (serialización JSON) ──────────────────────────────────────────────
#spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.wrap-root-value=false
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.fail-on-self-references=false
spring.jackson.time-zone=UTC
 
# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.restosync=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=${APP_HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql=${APP_HIBERNATE_BIND_LOG_LEVEL:WARN}
 
# ── Springdoc / Swagger ───────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}
