services:
  backend:
    build:
      context: ./Backend/comandas
    container_name: restosync-backend
    restart: unless-stopped
    network_mode: host
    environment:
      SERVER_ADDRESS: 127.0.0.1
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: "jdbc:mysql://127.0.0.1:3306/${MYSQL_DATABASE:-restosync_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8"
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-restosync_app}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      SPRING_SQL_INIT_MODE: ${SPRING_SQL_INIT_MODE:-never}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://restosync.rmpstack.blog}
      APP_WS_ALLOWED_ORIGINS: ${APP_WS_ALLOWED_ORIGINS:-https://restosync.rmpstack.blog}
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED:-false}

  frontend:
    build:
      context: ./ViewRestoSync
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api-restosync.rmpstack.blog/api}
        VITE_WS_URL: ${VITE_WS_URL:-https://api-restosync.rmpstack.blog/ws}
    container_name: restosync-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4173}:80"
